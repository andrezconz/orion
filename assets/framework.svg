<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" role="img" aria-labelledby="title desc">
  <title id="title">ORIÓN Intelligence Framework</title>
  <desc id="desc">Constelación de la metodología ORION Intelligence Framework con 7 etapas conectadas.</desc>
  <rect width="1080" height="720" fill="#ffffff" />
  <rect x="58" y="46" width="964" height="628" fill="#ffffff" stroke="#eef1f4" stroke-width="2" />

  <text
    x="540"
    y="100"
    text-anchor="middle"
    fill="#0f1e2e"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30"
    font-weight="700"
    letter-spacing="5"
  >
    ORION INTELLIGENCE FRAMEWORK
  </text>

  <!-- Constellation Connections -->
  <g fill="none" stroke="#0f1e2e" stroke-width="3" stroke-dasharray="6,4" stroke-linecap="round" stroke-linejoin="round" opacity="0.6">
    <!-- Outer borders of the hourglass -->
    <path d="M280 180 L800 180" /> <!-- shoulders -->
    <path d="M300 540 L780 540" /> <!-- knees -->
    <path d="M280 180 L300 540" /> <!-- left outer -->
    <path d="M800 180 L780 540" /> <!-- right outer -->
    
    <!-- Inner connections to the belt -->
    <path d="M280 180 L440 360" /> <!-- Betelgeuse to Mintaka -->
    <path d="M800 180 L640 360" /> <!-- Bellatrix to Alnitak -->
    <path d="M300 540 L440 360" /> <!-- Saiph to Mintaka -->
    <path d="M780 540 L640 360" /> <!-- Rigel to Alnitak -->
    
    <!-- The Belt -->
    <path d="M440 360 L540 360 L640 360" stroke="#0f1e2e" stroke-width="4" stroke-dasharray="none" />
  </g>

  <!-- Stars (Nodes) -->
  <g>
    <!-- 1. Discovery -->
    <circle cx="280" cy="180" r="12" fill="#0f1e2e" />
    <circle cx="280" cy="180" r="18" fill="none" stroke="#0f1e2e" stroke-width="1.5" opacity="0.4" />
    
    <!-- 2. Integration -->
    <circle cx="800" cy="180" r="12" fill="#0f1e2e" />
    <circle cx="800" cy="180" r="18" fill="none" stroke="#0f1e2e" stroke-width="1.5" opacity="0.4" />
    
    <!-- 3. Modeling -->
    <circle cx="440" cy="360" r="12" fill="#0f1e2e" />
    <circle cx="440" cy="360" r="18" fill="none" stroke="#0f1e2e" stroke-width="1.5" opacity="0.4" />
    
    <!-- 4. Decision Intelligence (Highlight Center Belt) -->
    <circle cx="540" cy="360" r="16" fill="#c8a96a" />
    <circle cx="540" cy="360" r="24" fill="none" stroke="#c8a96a" stroke-width="2" opacity="0.6" />
    
    <!-- 5. Policy Design -->
    <circle cx="640" cy="360" r="12" fill="#0f1e2e" />
    <circle cx="640" cy="360" r="18" fill="none" stroke="#0f1e2e" stroke-width="1.5" opacity="0.4" />
    
    <!-- 6. AI & Automation -->
    <circle cx="300" cy="540" r="12" fill="#0f1e2e" />
    <circle cx="300" cy="540" r="18" fill="none" stroke="#0f1e2e" stroke-width="1.5" opacity="0.4" />
    
    <!-- 7. Monitoring & Learning -->
    <circle cx="780" cy="540" r="12" fill="#0f1e2e" />
    <circle cx="780" cy="540" r="18" fill="none" stroke="#0f1e2e" stroke-width="1.5" opacity="0.4" />
  </g>

  <!-- Labels -->
  <g fill="#0f1e2e" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2">
    <text x="280" y="145" text-anchor="middle">1. INTELLIGENCE DISCOVERY</text>
    <text x="800" y="145" text-anchor="middle">2. DATA INTEGRATION</text>
    <text x="440" y="325" text-anchor="middle">3. ANALYTICAL MODELING</text>
    <text x="540" y="405" fill="#c8a96a" text-anchor="middle">4. DECISION INTELLIGENCE</text>
    <text x="640" y="325" text-anchor="middle">5. POLICY DESIGN</text>
    <text x="300" y="585" text-anchor="middle">6. AI &amp; AUTOMATION</text>
    <text x="780" y="585" text-anchor="middle">7. MONITORING &amp; LEARNING</text>
  </g>
</svg>
